  </text>

  <!-- underline flourish -->
  <path d="M420 225 Q600 245 780 225" stroke="#8A5A6B" stroke-width="2" fill="none" opacity="0.7"/>

  <!-- role chip -->
  <rect x="430" y="250" width="340" height="34" rx="17" fill="#FFF7E8" opacity="0.55"/>
  <text x="600" y="273" text-anchor="middle" font-family="Verdana, Geneva, sans-serif" font-size="15" fill="#4A2E45" letter-spacing="1">
    AI/ML ENGINEER  •  BACKEND DEVELOPER
  </text>
</svg>
